# Runtime-only application data must never be served as public content.
<Directory "/var/www/html/config">
    Require all denied
</Directory>

<Directory "/var/www/html/database">
    Require all denied
</Directory>

# Files below source/ are included by authenticated controllers. They are not
# standalone HTTP endpoints and do not perform their own session checks.
<DirectoryMatch "^/var/www/html/vulnerabilities/[^/]+/source(?:/|$)">
    Require all denied
</DirectoryMatch>

# Defense in depth for deployment artefacts accidentally copied elsewhere.
<FilesMatch "\.(?:bak|db|dist|ini|sql|sqlite)$">
    Require all denied
</FilesMatch>
